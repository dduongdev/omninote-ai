spring.application.name=api-gateway
server.port=8080

# Consul Registry
spring.cloud.consul.host=${CONSUL_HOST}
spring.cloud.consul.port=${CONSUL_PORT}
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.register=true
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# JWT
jwt.secret=${JWT_SECRET}

# Spring Cloud Gateway routes
# Route auth/user requests to the server service
spring.cloud.gateway.mvc.routes[0].id=server-route
spring.cloud.gateway.mvc.routes[0].uri=http://server:8080
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/auth/**,/api/users/**

# Route AI requests to the ai-service
spring.cloud.gateway.mvc.routes[1].id=ai-service-route
spring.cloud.gateway.mvc.routes[1].uri=http://ai-service:8080
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/ai/**
